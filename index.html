<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nossa Liga Cartola FC</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ea580c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para os ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Loading spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316; /* Laranja Cartola */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Esconde a scrollbar das abas mas permite scroll */
        .tabs-scroll::-webkit-scrollbar {
            display: none;
        }
        .tabs-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-orange-600 text-white shadow-md py-5 mb-6">
        <div class="container mx-auto px-4 flex items-center justify-center gap-3">
            <i data-lucide="trophy" class="w-7 h-7"></i>
            <h1 class="text-2xl font-bold tracking-tight">Estatísticas da Liga</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4">
        
        <!-- Área de Loading -->
        <div id="loading" class="py-20 text-center">
            <div class="loader mb-4"></div>
            <p class="text-gray-600 font-medium animate-pulse">Buscando dados na API do Cartola...</p>
        </div>

        <!-- Navegação por Abas (Oculta por padrão até carregar) -->
        <div id="tabs-container" class="hidden mb-6 border-b border-gray-200">
            <nav class="flex overflow-x-auto tabs-scroll space-x-6 pb-2 px-2" aria-label="Tabs">
                <button onclick="changeTab('rodada')" id="tab-rodada" class="tab-btn text-orange-600 border-orange-600 border-b-2 py-2 text-sm font-bold whitespace-nowrap transition-colors flex items-center gap-1">
                    <i data-lucide="calendar-days" class="w-4 h-4"></i> Por Rodada
                </button>
                <button onclick="changeTab('premiacao')" id="tab-premiacao" class="tab-btn text-gray-500 hover:text-gray-700 py-2 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-1">
                    <i data-lucide="banknote" class="w-4 h-4"></i> Premiação
                </button>
                <button onclick="changeTab('ranking')" id="tab-ranking" class="tab-btn text-gray-500 hover:text-gray-700 py-2 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-1">
                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Ranking
                </button>
            </nav>
        </div>

        <!-- Conteúdo das Abas -->
        <div id="views-container" class="hidden">
            
            <!-- Container Por Rodada (Aba Padrão) -->
            <div id="view-rodada" class="view-section max-w-4xl mx-auto">
                <div class="mb-4 flex flex-col sm:flex-row items-start sm:items-center gap-3 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <label for="rodada-select" class="font-medium text-gray-700 whitespace-nowrap">Selecione a Rodada:</label>
                    <select id="rodada-select" onchange="renderRankingRodada(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full sm:w-auto p-2.5 outline-none font-medium">
                        <!-- Options preenchidas via JS -->
                    </select>
                </div>
                <div id="ranking-rodada-container"></div>
            </div>

            <!-- Container Premiação -->
            <div id="view-premiacao" class="view-section hidden max-w-4xl mx-auto">
                <div id="ranking-premiacao-container"></div>
            </div>

            <!-- Container Ranking Unificado -->
            <div id="view-ranking" class="view-section hidden max-w-4xl mx-auto">
                <div id="ranking-geral-container"></div>
            </div>
        </div>
        
        <!-- Mensagem de Erro (Oculta por padrão) -->
        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative max-w-2xl mx-auto mt-8 text-center" role="alert">
            <strong class="font-bold" id="error-title">Ops! </strong>
            <span class="block sm:inline" id="error-text">Ocorreu um erro ao carregar os dados. A API pode estar bloqueando os nossos proxies.</span>
            <button onclick="fetchData()" class="mt-4 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Tentar Novamente
            </button>
        </div>

    </main>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Mapeamento dos jogadores fornecido
        const jogadores = [
            { nomeOriginal: 'GEORGE', id: 26323967 },
            { nomeOriginal: 'XINGU', id: 26331075 },
            { nomeOriginal: 'LEO', id: 20129034 },
            { nomeOriginal: 'PAULO', id: 27110420 },
            { nomeOriginal: 'VITOR', id: 5214103 },
            { nomeOriginal: 'RAFAEL', id: 22004383 }
        ];

        // Função para formatar moeda (Cartoletas)
        const formatMoney = (value) => {
            if (value === undefined || value === null) return "C$ 0.00";
            return `C$ ${value.toFixed(2)}`;
        };

        // Função para formatar pontos
        const formatPoints = (value) => {
            if (value === undefined || value === null) return "0.00";
            return value.toFixed(2);
        };

        // Formata para moeda Real (BRL), suportando negativos
        const formatReal = (value) => {
            const sign = value < 0 ? '-' : '';
            const absValue = Math.abs(value);
            return `${sign}R$ ${absValue.toFixed(2).replace('.', ',')}`;
        };

        // Variáveis globais
        let appData = [];
        let maxRound = 1;

        // Estado da ordenação da aba Ranking
        let rankingSortConfig = {
            column: 'pontos', // 'pontos' ou 'patrimonio'
            direction: 'desc' // 'desc' (maior para menor) ou 'asc' (menor para maior)
        };

        // Função para buscar a rodada atual da API dinamicamente
        async function fetchCurrentRound() {
            const apiUrl = 'https://api.cartola.globo.com/mercado/status';
            const proxies = [
                `https://api.codetabs.com/v1/proxy?quest=${apiUrl}`,
                `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`
            ];

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl, { cache: "no-store" });
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.rodada_atual) {
                            let rodada = data.rodada_atual;
                            
                            // Regra solicitada: Considerar a rodada atual apenas se o mercado estiver aberto.
                            if (data.status_mercado === 2) {
                                rodada = rodada - 1;
                                console.log(`Mercado fechado. A exibir dados consolidados até à rodada: ${rodada}`);
                            } else {
                                console.log(`Mercado aberto. A exibir dados até à rodada: ${rodada}`);
                            }
                            
                            return Math.max(1, rodada);
                        }
                    }
                } catch (error) {
                    console.warn(`Proxy falhou ao buscar status da rodada: ${proxyUrl}`);
                }
            }
            console.warn("Não foi possível detetar a rodada dinamicamente. A usar a rodada 6.");
            return 6;
        }

        // Função para buscar dados de um jogador por rodada
        async function fetchCartolaData(id, rodada, isCurrent = false) {
            const apiUrl = isCurrent 
                ? `https://api.cartola.globo.com/time/id/${id}`
                : `https://api.cartola.globo.com/time/id/${id}/${rodada}`;
            
            const proxies = [
                `https://api.codetabs.com/v1/proxy?quest=${apiUrl}`,
                `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`
            ];

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl, { cache: "no-store" });
                    if (response.ok) {
                        const cartolaData = await response.json();
                        if (cartolaData && cartolaData.time) {
                            return cartolaData;
                        }
                    }
                } catch (error) {
                    // ignora e tenta o proximo
                }
            }
            throw new Error(`Falha na rodada ${rodada}.`);
        }

        // Busca o histórico completo de 1 até à rodada atual para um jogador
        async function fetchPlayerHistory(jogador, rodadaAtual) {
            const promises = [];
            for (let r = 1; r <= rodadaAtual; r++) {
                const isCurrent = (r === rodadaAtual);
                promises.push(fetchCartolaData(jogador.id, r, isCurrent));
            }
            
            const resultados = await Promise.allSettled(promises);
            
            const history = resultados.map((res, index) => {
                if (res.status === 'fulfilled') {
                    return { rodada: index + 1, data: res.value, error: false };
                } else {
                    return { rodada: index + 1, data: null, error: true };
                }
            });

            const sucessos = history.filter(h => !h.error);
            if (sucessos.length === 0) {
                throw new Error(`Não foi possível obter nenhuma rodada para ${jogador.nomeOriginal}`);
            }

            return { ...jogador, history };
        }

        // Função principal para buscar os dados de todos
        async function fetchData() {
            const loadingEl = document.getElementById('loading');
            const tabsEl = document.getElementById('tabs-container');
            const viewsEl = document.getElementById('views-container');
            const errorEl = document.getElementById('error-message');
            const errorTextEl = document.getElementById('error-text');

            loadingEl.classList.remove('hidden');
            tabsEl.classList.add('hidden');
            viewsEl.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const loadingText = loadingEl.querySelector('p');
                loadingText.textContent = "A verificar a rodada atual no mercado...";
                const rodadaAtual = await fetchCurrentRound();
                
                loadingText.textContent = `A buscar dados até à rodada ${rodadaAtual}...`;

                const fetchPromises = jogadores.map(jogador => fetchPlayerHistory(jogador, rodadaAtual));
                const resultados = await Promise.allSettled(fetchPromises);
                
                const sucessos = resultados.filter(r => r.status === 'fulfilled').map(r => r.value);
                const falhas = resultados.filter(r => r.status === 'rejected');

                if (sucessos.length === 0) {
                    throw new Error("Não foi possível aceder à API do Cartola no momento devido a bloqueios de segurança (CORS). Tente novamente mais tarde.");
                }

                if (falhas.length > 0) {
                    console.warn(`${falhas.length} jogador(es) não puderam ser carregados.`);
                }
                
                appData = sucessos;
                maxRound = rodadaAtual;

                // Renderizar abas
                renderRankingRodadaSelector();
                renderRankingPremiacao();
                renderRanking();

                // Atualizar UI
                loadingEl.classList.add('hidden');
                tabsEl.classList.remove('hidden');
                viewsEl.classList.remove('hidden');
                
                lucide.createIcons();

            } catch (error) {
                console.error("Erro fatal ao buscar dados:", error);
                errorTextEl.textContent = error.message;
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // --- SISTEMA DE ABAS ---
        function changeTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('text-orange-600', 'border-orange-600', 'border-b-2', 'font-bold');
                el.classList.add('text-gray-500', 'font-medium');
            });

            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            const activeTab = document.getElementById(`tab-${tabName}`);
            activeTab.classList.remove('text-gray-500', 'font-medium');
            activeTab.classList.add('text-orange-600', 'border-orange-600', 'border-b-2', 'font-bold');
        }

        // --- ABA: POR RODADA ---
        function renderRankingRodadaSelector() {
            let options = '';
            for(let r = maxRound; r >= 1; r--) {
                options += `<option value="${r}">Rodada ${r}</option>`;
            }
            const selectEl = document.getElementById('rodada-select');
            selectEl.innerHTML = options;
            selectEl.value = maxRound;
            renderRankingRodada(maxRound);
        }

        function renderRankingRodada(rodadaStr) {
            const rodada = parseInt(rodadaStr);
            const mapped = appData.map(player => {
                const roundData = player.history.find(h => h.rodada === rodada && !h.error)?.data;
                const latest = player.history.filter(h => !h.error).pop()?.data; 
                
                return {
                    nomeTime: roundData?.time?.nome || latest?.time?.nome || 'Desconhecido',
                    nomeCartola: roundData?.time?.nome_cartola || latest?.time?.nome_cartola || player.nomeOriginal,
                    escudo: roundData?.time?.url_escudo_png || roundData?.time?.url_escudo_svg || latest?.time?.url_escudo_png || latest?.time?.url_escudo_svg || 'https://via.placeholder.com/150',
                    value: roundData?.pontos || 0
                };
            }).sort((a, b) => b.value - a.value);
            
            let rows = mapped.map((item, index) => {
                const isMedal = index < 3;
                const medalColors = ['text-yellow-500', 'text-gray-400', 'text-amber-600'];
                const rankDisplay = isMedal 
                    ? `<i data-lucide="medal" class="w-6 h-6 mx-auto ${medalColors[index]}"></i>` 
                    : `<span class="font-bold text-gray-500 text-lg">${index + 1}º</span>`;

                return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="py-3 px-3 sm:px-4 text-center w-12 sm:w-16 align-middle">${rankDisplay}</td>
                        <td class="py-3 px-3 sm:px-4 flex items-center gap-3 sm:gap-4">
                            <img src="${item.escudo}" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-gray-200 shadow-sm object-contain bg-white">
                            <div>
                                <div class="font-bold text-gray-800 text-sm sm:text-base leading-tight">${item.nomeTime}</div>
                                <div class="text-[11px] sm:text-xs text-gray-500 mt-0.5">${item.nomeCartola}</div>
                            </div>
                        </td>
                        <td class="py-3 px-3 sm:px-4 text-right font-bold text-blue-600 text-base sm:text-lg align-middle">
                            ${formatPoints(item.value)}
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('ranking-rodada-container').innerHTML = `
                <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-100">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600 uppercase text-xs border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-3 sm:px-4 text-center font-bold">Pos</th>
                                <th class="py-3 px-3 sm:px-4 font-bold">Time</th>
                                <th class="py-3 px-3 sm:px-4 text-right font-bold">Pontos</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
            lucide.createIcons();
        }

        // --- ABA: PREMIAÇÃO ---
        function renderRankingPremiacao() {
            const premios = {};
            appData.forEach(player => {
                premios[player.id] = {
                    nomeOriginal: player.nomeOriginal,
                    id: player.id,
                    totalGanho: 0,
                    totalGasto: 0,
                    vitorias: 0,
                    segundos: 0,
                    latestData: player.history.filter(h => !h.error).pop()?.data
                };
            });

            for (let r = 1; r <= maxRound; r++) {
                const roundResults = [];
                appData.forEach(player => {
                    const roundData = player.history.find(h => h.rodada === r && !h.error)?.data;
                    if (roundData && roundData.pontos !== undefined) {
                        roundResults.push({ id: player.id, pontos: roundData.pontos });
                        premios[player.id].totalGasto += 5.00;
                    }
                });

                roundResults.sort((a, b) => b.pontos - a.pontos);

                if (roundResults.length > 0) {
                    premios[roundResults[0].id].totalGanho += 24.00;
                    premios[roundResults[0].id].vitorias += 1;
                }
                if (roundResults.length > 1) {
                    premios[roundResults[1].id].totalGanho += 6.00;
                    premios[roundResults[1].id].segundos += 1;
                }
            }

            const mapped = Object.values(premios).map(p => {
                const saldoLiquido = p.totalGanho - p.totalGasto;
                return {
                    nomeTime: p.latestData?.time?.nome || 'Desconhecido',
                    nomeCartola: p.latestData?.time?.nome_cartola || p.nomeOriginal,
                    escudo: p.latestData?.time?.url_escudo_png || p.latestData?.time?.url_escudo_svg || 'https://via.placeholder.com/150',
                    ganho: p.totalGanho,
                    gasto: p.totalGasto,
                    saldo: saldoLiquido,
                    detalhes: `${p.vitorias}x Ouro, ${p.segundos}x Prata`
                };
            }).sort((a, b) => b.saldo - a.saldo);

            let rows = mapped.map((item, index) => {
                const isMedal = index < 3;
                const medalColors = ['text-yellow-500', 'text-gray-400', 'text-amber-600'];
                const rankDisplay = isMedal 
                    ? `<i data-lucide="medal" class="w-6 h-6 mx-auto ${medalColors[index]}"></i>` 
                    : `<span class="font-bold text-gray-500 text-lg">${index + 1}º</span>`;
                
                let saldoColor = 'text-gray-600';
                if (item.saldo > 0) saldoColor = 'text-green-600';
                if (item.saldo < 0) saldoColor = 'text-red-500';

                return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="py-3 px-3 sm:px-4 text-center w-12 sm:w-16 align-middle">${rankDisplay}</td>
                        <td class="py-3 px-3 sm:px-4 flex items-center gap-3 sm:gap-4">
                            <img src="${item.escudo}" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-gray-200 shadow-sm object-contain bg-white">
                            <div>
                                <div class="font-bold text-gray-800 text-sm sm:text-base leading-tight">${item.nomeTime}</div>
                                <div class="text-[11px] sm:text-xs text-gray-500 mt-0.5">${item.nomeCartola} <span class="font-medium text-amber-600 ml-1 hidden sm:inline">(${item.detalhes})</span></div>
                            </div>
                        </td>
                        <td class="py-3 px-3 sm:px-4 text-center text-red-400 align-middle hidden md:table-cell text-sm">
                            -${formatReal(item.gasto)}
                        </td>
                        <td class="py-3 px-3 sm:px-4 text-center text-green-500 align-middle hidden md:table-cell text-sm">
                            ${formatReal(item.ganho)}
                        </td>
                        <td class="py-3 px-3 sm:px-4 text-right font-bold ${saldoColor} text-base sm:text-lg align-middle">
                            ${formatReal(item.saldo)}
                            <div class="text-[10px] sm:hidden text-amber-600 font-medium">${item.detalhes}</div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('ranking-premiacao-container').innerHTML = `
                <div class="bg-green-50 border border-green-200 text-green-800 p-3 sm:p-4 rounded-xl mb-4 text-xs sm:text-sm text-center shadow-sm">
                    <p><strong>Regras:</strong> Fundo de R$ 30,00 por rodada (Custo R$ 5,00/jogador). <br class="hidden sm:block"> 🥇 1º: R$ 24,00 | 🥈 2º: R$ 6,00</p>
                </div>
                <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-100">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600 uppercase text-[10px] sm:text-xs border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-3 sm:px-4 text-center font-bold">Pos</th>
                                <th class="py-3 px-3 sm:px-4 font-bold">Time</th>
                                <th class="py-3 px-3 sm:px-4 text-center font-bold hidden md:table-cell">Investido</th>
                                <th class="py-3 px-3 sm:px-4 text-center font-bold hidden md:table-cell">Prémios</th>
                                <th class="py-3 px-3 sm:px-4 text-right font-bold">Saldo</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        // --- ABA: RANKING UNIFICADO (Ordenável) ---
        function toggleSort(column) {
            if (rankingSortConfig.column === column) {
                // Inverte a direção se for a mesma coluna
                rankingSortConfig.direction = rankingSortConfig.direction === 'desc' ? 'asc' : 'desc';
            } else {
                // Muda a coluna e define descrescente por padrão
                rankingSortConfig.column = column;
                rankingSortConfig.direction = 'desc';
            }
            renderRanking();
        }

        function renderRanking() {
            // Prepara os dados
            const mapped = appData.map(player => {
                const latest = player.history.filter(h => !h.error).pop()?.data;
                return {
                    nomeTime: latest?.time?.nome || 'Desconhecido',
                    nomeCartola: latest?.time?.nome_cartola || player.nomeOriginal,
                    escudo: latest?.time?.url_escudo_png || latest?.time?.url_escudo_svg || 'https://via.placeholder.com/150',
                    pontos: latest?.pontos_campeonato || 0,
                    patrimonio: latest?.patrimonio || 0
                };
            });

            // Ordena com base no estado atual
            mapped.sort((a, b) => {
                let valA = a[rankingSortConfig.column];
                let valB = b[rankingSortConfig.column];
                
                if (rankingSortConfig.direction === 'desc') {
                    return valB - valA;
                } else {
                    return valA - valB;
                }
            });

            // Monta as linhas
            let rows = mapped.map((item, index) => {
                const isMedal = index < 3 && rankingSortConfig.direction === 'desc'; // Só dá medalhas se for ordem decrescente normal
                const medalColors = ['text-yellow-500', 'text-gray-400', 'text-amber-600'];
                const rankDisplay = isMedal 
                    ? `<i data-lucide="medal" class="w-6 h-6 mx-auto ${medalColors[index]}"></i>` 
                    : `<span class="font-bold text-gray-500 text-lg">${index + 1}º</span>`;

                // Destaca visualmente a coluna que está sendo ordenada
                const isSortPontos = rankingSortConfig.column === 'pontos';
                const pontosClass = isSortPontos ? 'text-blue-700 font-extrabold' : 'text-blue-500 font-semibold';
                const patClass = !isSortPontos ? 'text-yellow-600 font-extrabold' : 'text-yellow-500 font-semibold';

                return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="py-3 px-2 sm:px-4 text-center w-10 sm:w-16 align-middle">${rankDisplay}</td>
                        <td class="py-3 px-2 sm:px-4 flex items-center gap-2 sm:gap-4">
                            <img src="${item.escudo}" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full border border-gray-200 shadow-sm object-contain bg-white">
                            <div class="overflow-hidden">
                                <div class="font-bold text-gray-800 text-xs sm:text-base leading-tight truncate">${item.nomeTime}</div>
                                <div class="text-[10px] sm:text-xs text-gray-500 mt-0.5 truncate">${item.nomeCartola}</div>
                            </div>
                        </td>
                        <td class="py-3 px-2 sm:px-4 text-center align-middle text-sm sm:text-lg ${pontosClass}">
                            ${formatPoints(item.pontos)}
                        </td>
                        <td class="py-3 px-2 sm:px-4 text-right align-middle text-sm sm:text-lg ${patClass}">
                            ${formatMoney(item.patrimonio)}
                        </td>
                    </tr>
                `;
            }).join('');

            // Lógica para desenhar as setinhas no cabeçalho
            const sortIcon = rankingSortConfig.direction === 'desc' ? 'arrow-down' : 'arrow-up';
            
            const pontosHeaderIcon = rankingSortConfig.column === 'pontos' 
                ? `<i data-lucide="${sortIcon}" class="w-3 h-3 sm:w-4 sm:h-4 inline-block text-orange-600"></i>` : '';
                
            const patHeaderIcon = rankingSortConfig.column === 'patrimonio' 
                ? `<i data-lucide="${sortIcon}" class="w-3 h-3 sm:w-4 sm:h-4 inline-block text-orange-600"></i>` : '';

            document.getElementById('ranking-geral-container').innerHTML = `
                <div class="bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-xl mb-4 text-xs sm:text-sm text-center shadow-sm">
                    <p><i data-lucide="info" class="w-4 h-4 inline-block relative -top-0.5 mr-1"></i> Toque nos títulos das colunas para alterar a ordenação do ranking.</p>
                </div>
                <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-100">
                    <table class="w-full text-sm text-left table-fixed sm:table-auto">
                        <thead class="bg-gray-50 text-gray-600 uppercase text-[10px] sm:text-xs border-b border-gray-200">
                            <tr>
                                <th class="py-3 px-2 sm:px-4 w-10 sm:w-16 text-center font-bold">Pos</th>
                                <th class="py-3 px-2 sm:px-4 font-bold w-1/3 sm:w-auto">Time</th>
                                <th class="py-3 px-2 sm:px-4 text-center font-bold cursor-pointer hover:bg-gray-200 select-none transition-colors" onclick="toggleSort('pontos')">
                                    <div class="flex items-center justify-center gap-1">Pontos ${pontosHeaderIcon}</div>
                                </th>
                                <th class="py-3 px-2 sm:px-4 text-right font-bold cursor-pointer hover:bg-gray-200 select-none transition-colors" onclick="toggleSort('patrimonio')">
                                    <div class="flex items-center justify-end gap-1">Patrimônio ${patHeaderIcon}</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
            lucide.createIcons();
        }

        // Iniciar busca assim que a página carregar
        document.addEventListener('DOMContentLoaded', fetchData);

        // Registrar o Service Worker para transformar em PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    navigator.serviceWorker.register('sw.js')
                        .then(registration => console.log('PWA Service Worker registado!'))
                        .catch(err => console.warn('Aviso: Service Worker não registado (normal em modo preview).', err));
                } else {
                    console.log('Modo PWA inativo: O Service Worker requer hospedagem real (HTTP/HTTPS) para funcionar.');
                }
            });
        }
    </script>
</body>
</html>
